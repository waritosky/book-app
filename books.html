<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>蔵書一覧</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>📚 蔵書一覧</h1>
      <p id="count" class="count-text"></p>
    </header>

    <section class="search-box">
      <div class="search-row">
        <div class="search-input-wrap">
          <input type="text" id="searchInput" placeholder="🔍 タイトル・著者で検索">
          <button id="clearSearchBtn" class="clear-search-btn" type="button" aria-label="検索文字をクリア">×</button>
        </div>

        <select id="sortOrderSelect" class="sort-select">
          <option value="asc">書籍名 昇順</option>
          <option value="desc">書籍名 降順</option>
        </select>
      </div>
    </section>

    <div id="bookList" class="grid"></div>

    <div class="pagination" id="pagination">
      <button id="prevPageBtn" class="secondary-btn">← 前へ</button>
      <p id="pageInfo" class="page-info"></p>
      <button id="nextPageBtn" class="secondary-btn">次へ →</button>
    </div>

    <nav class="bottom-nav">
      <a href="index.html" class="link-btn">← スキャン画面へ戻る</a>
    </nav>
    <!-- 削除確認モーダル -->
    <div id="confirmModal" class="modal" style="display:none;">
      <div class="modal-card">
        <p id="modalMessage" class="modal-text"></p>

        <div class="modal-actions">
          <button id="cancelBtn" class="secondary-btn">キャンセル</button>
          <button id="confirmBtn" class="danger-btn">削除する</button>
        </div>
      </div>
    </div>
    <div id="toast" class="toast" style="display:none;"></div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script>
    const container = document.getElementById("bookList");
    let books = getBooks();
    const searchInput = document.getElementById("searchInput");
    const countEl = document.getElementById("count");
    const modal = document.getElementById("confirmModal");
    const modalMessage = document.getElementById("modalMessage");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const toast = document.getElementById("toast");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const pageInfo = document.getElementById("pageInfo");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const sortOrderSelect = document.getElementById("sortOrderSelect");
    const REFRESH_RETRY_DAYS = [1, 3, 7, 14, 30];
    const REFRESH_STOP_AFTER = 6;

    let targetIsbn = null;
    let toastTimer = null;
    let toastHideTimer = null;

    let currentPage = 1;
    let currentFilteredBooks = [];

    // スマホのアドレスバー開閉で高さが細かく変わっても暴れないようにする
    let lastViewportWidth = window.innerWidth;
    let lastItemsPerPage = getItemsPerPage();

    function highlight(text, keyword) {
      if (!keyword) return text;

      const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp(`(${escaped})`, "gi");
      return text.replace(regex, "<mark>$1</mark>");
    }

    function normalizeSearchText(text) {
      if (!text) return "";

      return String(text)
        .toLowerCase()
        .normalize("NFKC")
        .replace(/[ァ-ヶ]/g, ch =>
          String.fromCharCode(ch.charCodeAt(0) - 0x60)
        )
        .replace(/\s+/g, "")
        .replace(/[‐－―ー\-]/g, "")
        .replace(/[！!？?・,，。.\(\)（）「」『』【】\[\]]/g, "");
    }

    function getNGrams(text, n = 2) {
      if (!text) return [];
      if (text.length < n) return [text];

      const grams = [];
      for (let i = 0; i <= text.length - n; i++) {
        grams.push(text.slice(i, i + n));
      }
      return grams;
    }

    function calcNGramSimilarity(a, b, n = 2) {
      if (!a || !b) return 0;

      const setA = new Set(getNGrams(a, n));
      const setB = new Set(getNGrams(b, n));

      let common = 0;
      for (const token of setA) {
        if (setB.has(token)) {
          common++;
        }
      }

      const unionSize = new Set([...setA, ...setB]).size;
      if (unionSize === 0) return 0;

      return common / unionSize;
    }

    function getContainScore(target, query) {
      if (!target || !query) return 0;

      const index = target.indexOf(query);
      if (index === -1) return 0;

      // 完全一致
      if (target === query) {
        return 1.0;
      }

      // 前方一致
      if (index === 0) {
        return 0.92;
      }

      // 後方一致
      if (index + query.length === target.length) {
        return 0.88;
      }

      // 単語境界っぽい位置（「の」「・」「 」などの直後）
      const prevChar = target[index - 1] || "";
      if (/[\s　・の\-]/.test(prevChar)) {
        return 0.84;
      }

      // ふつうの部分一致
      return 0.78;
    }

    function getLengthBalanceScore(target, query) {
      if (!target || !query) return 0;

      const shorter = Math.min(target.length, query.length);
      const longer = Math.max(target.length, query.length);

      if (longer === 0) return 0;

      return shorter / longer;
    }

    function getBookSearchScore(book, keyword) {
      const q = normalizeSearchText(keyword);
      if (!q) return 1;

      const title = normalizeSearchText(book.title || "");
      const author = normalizeSearchText(book.author || "");

      let score = 0;

      // --- タイトル一致を最優先 ---
      const titleContainScore = getContainScore(title, q);
      const authorContainScore = getContainScore(author, q);

      const titleLengthBalance = getLengthBalanceScore(title, q);
      const authorLengthBalance = getLengthBalanceScore(author, q);

      if (titleContainScore > 0) {
        score = Math.max(
          score,
          titleContainScore + titleLengthBalance * 0.08
        );
      }

      if (authorContainScore > 0) {
        score = Math.max(
          score,
          authorContainScore * 0.82 + authorLengthBalance * 0.06
        );
      }

      // --- 検索語の方が長い場合の救済 ---
      if (title && q.includes(title) && title.length >= 2) {
        score = Math.max(score, 0.72 + titleLengthBalance * 0.08);
      }

      if (author && q.includes(author) && author.length >= 2) {
        score = Math.max(score, 0.60 + authorLengthBalance * 0.05);
      }

      // --- クエリをゆるく分割して一部一致も拾う ---
      const qParts = q
        .split(/[・\s　]+/)
        .map(part => part.trim())
        .filter(Boolean);

      let partialTitleHits = 0;
      let partialAuthorHits = 0;

      for (const part of qParts) {
        if (part.length < 2) continue;

        if (title.includes(part)) {
          partialTitleHits++;
        }

        if (author.includes(part)) {
          partialAuthorHits++;
        }
      }

      if (partialTitleHits > 0) {
        score = Math.max(score, 0.68 + Math.min(partialTitleHits, 3) * 0.05);
      }

      if (partialAuthorHits > 0) {
        score = Math.max(score, 0.52 + Math.min(partialAuthorHits, 3) * 0.04);
      }

      // --- あいまい一致（軽い誤字対策） ---
      const titleBiGram = calcNGramSimilarity(title, q, 2);
      const titleTriGram = calcNGramSimilarity(title, q, 3);
      const authorBiGram = calcNGramSimilarity(author, q, 2);

      score = Math.max(score, titleBiGram * 0.72);
      score = Math.max(score, titleTriGram * 0.80);
      score = Math.max(score, authorBiGram * 0.55);

      return score;
    }

    function getSeriesSortInfo(book) {
      const rawTitle = String(book.title || "").trim();

      // 全角数字を半角数字へ
      const toHalfWidthNumber = value =>
        String(value).replace(/[０-９]/g, ch =>
          String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)
        );

      function getSpecialVolumeOrder(text) {
        const normalized = text.trim();

        if (/^(上|上巻)$/.test(normalized)) return 1;
        if (/^(中|中巻)$/.test(normalized)) return 2;
        if (/^(下|下巻)$/.test(normalized)) return 3;

        if (/^(前|前編)$/.test(normalized)) return 1;
        if (/^(中編)$/.test(normalized)) return 2;
        if (/^(後|後編)$/.test(normalized)) return 3;

        if (/^(序)$/.test(normalized)) return 0;
        if (/^(完|完結編)$/.test(normalized)) return 9999;

        return null;
      }

      // 版情報をシリーズ名から除去して寄せる
      function normalizeEditionSuffix(title) {
        return title
          .replace(/[\s　]*【[^】]*】$/g, "")
          .replace(/[\s　]*\[[^\]]*\]$/g, "")
          .replace(/[\s　]*\([^)]*\)$/g, "")
          .replace(/[\s　]*（[^）]*）$/g, "")
          .replace(/[\s　]*(特装版|限定版|通常版|完全版|愛蔵版|新装版|文庫版|ワイド版|廉価版|復刻版|豪華版|合本版|電子版)$/g, "")
          .replace(/[\s　]*(特装|限定|完全|愛蔵|新装|文庫|ワイド|廉価|復刻|豪華|合本)$/g, "")
          .trim();
      }

      // 数字巻を優先判定
      const numberPatterns = [
        /^(.*?)[\s　]*第\s*([0-9０-９]+)\s*巻$/,
        /^(.*?)[\s　]*([0-9０-９]+)\s*巻$/,
        /^(.*?)[\s　]*([0-9０-９]+)$/,
        /^(.*?)[\s　]*\(([0-9０-９]+)\)$/,
        /^(.*?)[\s　]*（([0-9０-９]+)）$/,
        /^(.*?)[\s　]*Vol\.?\s*([0-9０-９]+)$/i,
        /^(.*?)[\s　]*volume\.?\s*([0-9０-９]+)$/i
      ];

      for (const pattern of numberPatterns) {
        const match = rawTitle.match(pattern);
        if (match) {
          const baseTitle = (match[1] || "").trim();
          const seriesTitle = normalizeEditionSuffix(baseTitle);
          const volumeText = toHalfWidthNumber(match[2] || "");
          const volumeNumber = Number(volumeText);

          return {
            rawTitle,
            seriesTitle: seriesTitle || baseTitle || rawTitle,
            normalizedSeriesTitle: normalizeSearchText(seriesTitle || baseTitle || rawTitle),
            volumeNumber: Number.isFinite(volumeNumber) ? volumeNumber : null
          };
        }
      }

      // 上・中・下 / 前・後 などを判定
      const specialPatterns = [
        /^(.*?)[\s　]*([上下中])$/,
        /^(.*?)[\s　]*(上巻|中巻|下巻)$/,
        /^(.*?)[\s　]*([前後])$/,
        /^(.*?)[\s　]*(前編|中編|後編)$/,
        /^(.*?)[\s　]*(序|完|完結編)$/
      ];

      for (const pattern of specialPatterns) {
        const match = rawTitle.match(pattern);
        if (match) {
          const baseTitle = (match[1] || "").trim();
          const seriesTitle = normalizeEditionSuffix(baseTitle);
          const specialText = (match[2] || "").trim();
          const specialOrder = getSpecialVolumeOrder(specialText);

          return {
            rawTitle,
            seriesTitle: seriesTitle || baseTitle || rawTitle,
            normalizedSeriesTitle: normalizeSearchText(seriesTitle || baseTitle || rawTitle),
            volumeNumber: specialOrder
          };
        }
      }

      // 巻数が無いタイトルでも版情報を落として近くに寄せる
      const normalizedBaseTitle = normalizeEditionSuffix(rawTitle);

      return {
        rawTitle,
        seriesTitle: normalizedBaseTitle || rawTitle,
        normalizedSeriesTitle: normalizeSearchText(normalizedBaseTitle || rawTitle),
        volumeNumber: null
      };
    }

    function compareBooksByTitleAndVolume(a, b, sortOrder = "asc") {
      const infoA = getSeriesSortInfo(a);
      const infoB = getSeriesSortInfo(b);

      const direction = sortOrder === "desc" ? -1 : 1;

      const seriesCompare = infoA.normalizedSeriesTitle.localeCompare(
        infoB.normalizedSeriesTitle,
        "ja"
      );

      if (seriesCompare !== 0) {
        return seriesCompare * direction;
      }

      const volumeA = infoA.volumeNumber;
      const volumeB = infoB.volumeNumber;

      if (volumeA != null && volumeB != null && volumeA !== volumeB) {
        return (volumeA - volumeB) * direction;
      }

      if (volumeA == null && volumeB != null) {
        return -1 * direction;
      }

      if (volumeA != null && volumeB == null) {
        return 1 * direction;
      }

      return infoA.rawTitle.localeCompare(infoB.rawTitle, "ja") * direction;
    }

    function getFallbackImage() {
      return (
        "data:image/svg+xml;utf8," +
        encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="160">
            <rect width="100%" height="100%" fill="#e5e7eb"/>
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
              font-size="14" fill="#6b7280">NO IMAGE</text>
          </svg>
        `)
      );
    }

    function showToast(message) {
      toast.textContent = message;
      toast.style.display = "block";

      if (toastTimer) clearTimeout(toastTimer);
      if (toastHideTimer) clearTimeout(toastHideTimer);

      requestAnimationFrame(() => {
        toast.classList.add("show");
      });

      toastTimer = setTimeout(() => {
        toast.classList.remove("show");

        toastHideTimer = setTimeout(() => {
          toast.style.display = "none";
        }, 200);
      }, 1200);
    }

    confirmBtn.onclick = () => {
      if (!targetIsbn) return;

      deleteBook(targetIsbn);
      modal.style.display = "none";
      targetIsbn = null;

      showToast("削除しました");
      refreshBooks();
    };

    cancelBtn.onclick = () => {
      modal.style.display = "none";
      targetIsbn = null;
    };

    modal.onclick = (e) => {
      if (e.target === modal) {
        modal.style.display = "none";
        targetIsbn = null;
      }
    };

    function needsBookRefresh(book) {
      const missingThumbnail = !book.thumbnail;

      const missingTitle =
        !book.title || book.title.trim() === "" || book.title === "タイトル不明";

      const missingAuthor =
        !book.author || book.author.trim() === "" || book.author === "著者不明";

      return missingThumbnail || missingTitle || missingAuthor;
    }

    function shouldShowMissingInfoBadge(book) {
      if (!needsBookRefresh(book)) return false;

      const meta = book.refreshMeta;
      if (!meta) return false;

      return meta.stopped === true;
    }

    function getRefreshMeta(book) {
      if (!book.refreshMeta) {
        book.refreshMeta = {
          retryCount: 0,
          lastTriedAt: "",
          nextRetryAt: "",
          stopped: false
        };
      }

      return book.refreshMeta;
    }

    function getRetryDays(retryCount) {
      return REFRESH_RETRY_DAYS[
        Math.min(retryCount, REFRESH_RETRY_DAYS.length - 1)
      ];
    }

    function shouldTryRefresh(book) {
      if (!needsBookRefresh(book)) return false;

      const meta = getRefreshMeta(book);

      if (meta.stopped) return false;
      if (!meta.nextRetryAt) return true;

      return Date.now() >= new Date(meta.nextRetryAt).getTime();
    }

    function markRefreshSucceeded(book) {
      book.refreshMeta = {
        retryCount: 0,
        lastTriedAt: new Date().toISOString(),
        nextRetryAt: "",
        stopped: false
      };
    }

    function markRefreshFailed(book) {
      const meta = getRefreshMeta(book);
      const now = new Date();

      meta.retryCount += 1;
      meta.lastTriedAt = now.toISOString();

      if (meta.retryCount >= REFRESH_STOP_AFTER) {
        meta.stopped = true;
        meta.nextRetryAt = "";
        return;
      }

      const days = getRetryDays(meta.retryCount - 1);
      const next = new Date(now);
      next.setDate(next.getDate() + days);

      meta.nextRetryAt = next.toISOString();
    }

    function getItemsPerPage() {
      const width = window.innerWidth;

      if (width >= 900) return 12;
      if (width >= 600) return 10;
      return 8;
    }

    function updatePagination(totalItems) {
      const itemsPerPage = getItemsPerPage();
      const totalPages = Math.max(1, Math.ceil(totalItems / itemsPerPage));

      if (currentPage > totalPages) {
        currentPage = totalPages;
      }

      pageInfo.textContent = `${currentPage} / ${totalPages}ページ`;

      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
    }

    function updateClearButtonVisibility() {
      const hasValue = searchInput.value.length > 0;
      clearSearchBtn.style.display = hasValue ? "flex" : "none";
    }

    function refreshBooks() {
      books = getBooks();

      const keyword = searchInput.value.trim();
      const sortOrder = sortOrderSelect.value;

      if (!keyword) {
        currentFilteredBooks = [...books].sort((a, b) =>
          compareBooksByTitleAndVolume(a, b, sortOrder)
        );
      } else {
        currentFilteredBooks = books
          .map(book => ({
            book,
            score: getBookSearchScore(book, keyword)
          }))
          .filter(item => item.score >= 0.25)
          .sort((a, b) => {
            // まず一致度順
            if (b.score !== a.score) {
              return b.score - a.score;
            }

            // 一致度が同じなら書籍名＋巻数順
            return compareBooksByTitleAndVolume(a.book, b.book, sortOrder);
          })
          .map(item => item.book);
      }

      updateClearButtonVisibility();
      updatePagination(currentFilteredBooks.length);
      renderBooks(currentFilteredBooks);
    }

    async function refreshBookCovers() {
      books = getBooks();

      let updatedCount = 0;
      let metaChanged = false;

      for (let i = 0; i < books.length; i++) {
        const book = books[i];

        if (!book.isbn || !isBookISBN(book.isbn)) continue;
        if (!shouldTryRefresh(book)) continue;

        try {
          const fetched = await fetchBook(book.isbn);

          if (!fetched) {
            markRefreshFailed(book);
            metaChanged = true;
            continue;
          }

          const nextTitle =
            fetched.title && fetched.title !== "タイトル不明"
              ? fetched.title
              : (book.title || "タイトル不明");

          const nextAuthor =
            fetched.author && fetched.author !== "著者不明"
              ? fetched.author
              : (book.author || "著者不明");

          const nextThumbnail =
            fetched.thumbnail || book.thumbnail || "";

          const infoImproved =
            nextTitle !== (book.title || "") ||
            nextAuthor !== (book.author || "") ||
            nextThumbnail !== (book.thumbnail || "");

          if (infoImproved) {
            book.title = nextTitle;
            book.author = nextAuthor;
            book.thumbnail = nextThumbnail;
            markRefreshSucceeded(book);
            updatedCount++;
            metaChanged = true;
          } else {
            markRefreshFailed(book);
            metaChanged = true;
          }
        } catch (e) {
          console.error(`書籍情報再取得エラー: ${book.isbn}`, e);
          markRefreshFailed(book);
          metaChanged = true;
        }
      }

      if (updatedCount > 0 || metaChanged) {
        saveBooks(books);
      }

      if (updatedCount > 0) {
        refreshBooks();
        showToast(`${updatedCount}件更新しました`);
      }
    }

    function renderBooks(list) {
      container.innerHTML = "";
      countEl.textContent = `${list.length}件`;

      const keyword = searchInput.value;
      const itemsPerPage = getItemsPerPage();
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const pageItems = list.slice(startIndex, endIndex);

      pageItems.forEach(book => {
        const card = document.createElement("div");
        card.className = "card book-card";

        const cover = document.createElement("img");
        cover.className = "book-cover";
        cover.src = book.thumbnail || getFallbackImage();
        cover.alt = `${book.title || "書籍"} の表紙`;

        const content = document.createElement("div");
        content.className = "book-card-body";

        const seriesInfo = getSeriesSortInfo(book);

        const seriesLabel = document.createElement("p");
        seriesLabel.className = "series-label";

        const title = document.createElement("h3");
        const author = document.createElement("p");
        const meta = document.createElement("p");
        const status = document.createElement("p");
        const badgeRow = document.createElement("div");
        badgeRow.className = "badge-row";

        const rawTitle = String(book.title || "").trim();
        const seriesTitleToShow =
          seriesInfo.seriesTitle && seriesInfo.seriesTitle !== rawTitle
            ? seriesInfo.seriesTitle
            : "";

        if (seriesTitleToShow) {
          seriesLabel.textContent = `シリーズ: ${seriesTitleToShow}`;
        }

        title.innerHTML = highlight(book.title || "タイトル不明", keyword);
        author.innerHTML = highlight(book.author || "著者不明", keyword);

        if (shouldShowMissingInfoBadge(book)) {
          const missingBadge = document.createElement("span");
          missingBadge.className = "info-missing-badge";
          missingBadge.textContent = "情報不足";
          badgeRow.appendChild(missingBadge);
        }

        meta.className = "meta-text";
        meta.textContent = `ISBN: ${book.isbn}`;

        if (book.loan) {
          status.textContent = `貸出中：${book.loan.user} (${book.loan.date})`;
          status.className = "loan";
        } else {
          status.textContent = "所蔵中";
          status.className = "available";
        }

        const actionRow = document.createElement("div");
        actionRow.className = "card-action-row";

        if (book.loan) {
          const returnBtn = document.createElement("button");
          returnBtn.textContent = "返却";
          returnBtn.className = "primary-btn";
          returnBtn.onclick = () => {
            returnBook(book.isbn);
            showToast(`「${book.title}」を返却しました`);
            refreshBooks();
          };
          actionRow.appendChild(returnBtn);
        } else {
          const loanBtn = document.createElement("button");
          loanBtn.textContent = "貸出";
          loanBtn.className = "secondary-btn";
          loanBtn.onclick = () => {
            const user = prompt("貸出相手の名前を入力");
            if (!user) return;

            loanBook(book.isbn, user);
            showToast(`「${book.title}」を貸出しました`);
            refreshBooks();
          };
          actionRow.appendChild(loanBtn);
        }

        const delBtn = document.createElement("button");
        delBtn.textContent = "削除";
        delBtn.className = "danger-btn";
        delBtn.onclick = () => {
          modalMessage.textContent = `「${book.title}」を削除しますか？`;
          modal.style.display = "flex";
          targetIsbn = book.isbn;
        };
        actionRow.appendChild(delBtn);

        if (seriesTitleToShow) {
          content.appendChild(seriesLabel);
        }

        content.appendChild(title);

        if (badgeRow.childNodes.length > 0) {
          content.appendChild(badgeRow);
        }

        content.appendChild(author);
        content.appendChild(meta);
        content.appendChild(status);
        content.appendChild(actionRow);

        card.appendChild(cover);
        card.appendChild(content);

        container.appendChild(card);
      });

      updatePagination(list.length);
    }

    prevPageBtn.onclick = () => {
      if (currentPage <= 1) return;
      currentPage--;
      renderBooks(currentFilteredBooks);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    nextPageBtn.onclick = () => {
      const totalPages = Math.max(1, Math.ceil(currentFilteredBooks.length / getItemsPerPage()));
      if (currentPage >= totalPages) return;
      currentPage++;
      renderBooks(currentFilteredBooks);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    searchInput.addEventListener("input", () => {
      currentPage = 1;
      refreshBooks();
    });

    clearSearchBtn.onclick = () => {
      searchInput.value = "";
      currentPage = 1;
      refreshBooks();
      searchInput.focus();
    };

    sortOrderSelect.addEventListener("change", () => {
      currentPage = 1;
      refreshBooks();
    });

    window.addEventListener("resize", () => {
      const nextWidth = window.innerWidth;
      const widthChanged = Math.abs(nextWidth - lastViewportWidth) >= 40;

      if (!widthChanged) {
        return;
      }

      lastViewportWidth = nextWidth;
      lastItemsPerPage = getItemsPerPage();
      refreshBooks();
    });

    refreshBooks();

    setTimeout(() => {
      refreshBookCovers();
    }, 0);
  </script>
</body>
</html>
