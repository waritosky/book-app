<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>蔵書一覧</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>📚 蔵書一覧</h1>
      <p id="count" class="count-text"></p>
    </header>

    <section class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 タイトル・著者で検索">
    </section>

    <div id="bookList" class="grid"></div>

    <div class="pagination" id="pagination">
      <button id="prevPageBtn" class="secondary-btn">← 前へ</button>
      <p id="pageInfo" class="page-info"></p>
      <button id="nextPageBtn" class="secondary-btn">次へ →</button>
    </div>

    <nav class="bottom-nav">
      <a href="index.html" class="link-btn">← スキャン画面へ戻る</a>
    </nav>
    <!-- 削除確認モーダル -->
    <div id="confirmModal" class="modal" style="display:none;">
      <div class="modal-card">
        <p id="modalMessage" class="modal-text"></p>

        <div class="modal-actions">
          <button id="cancelBtn" class="secondary-btn">キャンセル</button>
          <button id="confirmBtn" class="danger-btn">削除する</button>
        </div>
      </div>
    </div>
    <div id="toast" class="toast" style="display:none;"></div>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script>
    const container = document.getElementById("bookList");
    let books = getBooks();
    const searchInput = document.getElementById("searchInput");
    const countEl = document.getElementById("count");
    const modal = document.getElementById("confirmModal");
    const modalMessage = document.getElementById("modalMessage");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const toast = document.getElementById("toast");
    const REFRESH_RETRY_DAYS = [1, 3, 7, 14, 30];
    const REFRESH_STOP_AFTER = 6;
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const pageInfo = document.getElementById("pageInfo");

    let targetIsbn = null;
    let currentPage = 1;
    let currentFilteredBooks = [];

    function highlight(text, keyword) {
      if (!keyword) return text;

      const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp(`(${escaped})`, "gi");
      return text.replace(regex, "<mark>$1</mark>");
    }

    function getFallbackImage() {
      return (
        "data:image/svg+xml;utf8," +
        encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="160">
            <rect width="100%" height="100%" fill="#e5e7eb"/>
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
              font-size="14" fill="#6b7280">NO IMAGE</text>
          </svg>
        `)
      );
    }

    confirmBtn.onclick = () => {
      if (!targetIsbn) return;

      deleteBook(targetIsbn);
      modal.style.display = "none";
      targetIsbn = null;

      showToast("削除しました");
      refreshBooks();
    };

    cancelBtn.onclick = () => {
      modal.style.display = "none";
      targetIsbn = null;
    };

    modal.onclick = (e) => {
      if (e.target === modal) {
        modal.style.display = "none";
        targetIsbn = null;
      }
    };

    prevPageBtn.onclick = () => {
      if (currentPage <= 1) return;
      currentPage--;
      renderBooks(currentFilteredBooks);
    };

    nextPageBtn.onclick = () => {
      const totalPages = Math.max(1, Math.ceil(currentFilteredBooks.length / getItemsPerPage()));
      if (currentPage >= totalPages) return;
      currentPage++;
      renderBooks(currentFilteredBooks);
    };

    function showToast(message) {
      toast.textContent = message;
      toast.style.display = "block";

      requestAnimationFrame(() => {
        toast.classList.add("show");
      });

      setTimeout(() => {
        toast.classList.remove("show");

        setTimeout(() => {
          toast.style.display = "none";
        }, 200);
      }, 1200);
    }

    async function refreshBookCovers() {
      books = getBooks();

      let updatedCount = 0;
      let metaChanged = false;

      for (let i = 0; i < books.length; i++) {
        const book = books[i];

        if (!book.isbn || !isBookISBN(book.isbn)) continue;
        if (!shouldTryRefresh(book)) continue;

        try {
          const fetched = await fetchBook(book.isbn);

          if (!fetched) {
            markRefreshFailed(book);
            metaChanged = true;
            continue;
          }

          const nextTitle =
            fetched.title && fetched.title !== "タイトル不明"
              ? fetched.title
              : (book.title || "タイトル不明");

          const nextAuthor =
            fetched.author && fetched.author !== "著者不明"
              ? fetched.author
              : (book.author || "著者不明");

          const nextThumbnail =
            fetched.thumbnail || book.thumbnail || "";

          const infoImproved =
            nextTitle !== (book.title || "") ||
            nextAuthor !== (book.author || "") ||
            nextThumbnail !== (book.thumbnail || "");

          if (infoImproved) {
            book.title = nextTitle;
            book.author = nextAuthor;
            book.thumbnail = nextThumbnail;
            markRefreshSucceeded(book);
            updatedCount++;
            metaChanged = true;
          } else {
            markRefreshFailed(book);
            metaChanged = true;
          }
        } catch (e) {
          console.error(`書籍情報再取得エラー: ${book.isbn}`, e);
          markRefreshFailed(book);
          metaChanged = true;
        }
      }

      if (updatedCount > 0 || metaChanged) {
        saveBooks(books);
      }

      if (updatedCount > 0) {
        refreshBooks();
        showToast(`${updatedCount}件更新しました`);
      }
    }

    function needsBookRefresh(book) {
      const missingThumbnail = !book.thumbnail;

      const missingTitle =
        !book.title || book.title.trim() === "" || book.title === "タイトル不明";

      const missingAuthor =
        !book.author || book.author.trim() === "" || book.author === "著者不明";

      return missingThumbnail || missingTitle || missingAuthor;
    }

    function shouldShowMissingInfoBadge(book) {
      if (!needsBookRefresh(book)) return false;

      const meta = book.refreshMeta;
      if (!meta) return false;

      return meta.stopped === true;
    }

    function getRefreshMeta(book) {
      if (!book.refreshMeta) {
        book.refreshMeta = {
          retryCount: 0,
          lastTriedAt: "",
          nextRetryAt: "",
          stopped: false
        };
      }

      return book.refreshMeta;
    }

    function getRetryDays(retryCount) {
      return REFRESH_RETRY_DAYS[
        Math.min(retryCount, REFRESH_RETRY_DAYS.length - 1)
      ];
    }

    function shouldTryRefresh(book) {
      if (!needsBookRefresh(book)) return false;

      const meta = getRefreshMeta(book);

      if (meta.stopped) return false;
      if (!meta.nextRetryAt) return true;

      return Date.now() >= new Date(meta.nextRetryAt).getTime();
    }

    function markRefreshSucceeded(book) {
      book.refreshMeta = {
        retryCount: 0,
        lastTriedAt: new Date().toISOString(),
        nextRetryAt: "",
        stopped: false
      };
    }

    function markRefreshFailed(book) {
      const meta = getRefreshMeta(book);
      const now = new Date();

      meta.retryCount += 1;
      meta.lastTriedAt = now.toISOString();

      if (meta.retryCount >= REFRESH_STOP_AFTER) {
        meta.stopped = true;
        meta.nextRetryAt = "";
        return;
      }

      const days = getRetryDays(meta.retryCount - 1);
      const next = new Date(now);
      next.setDate(next.getDate() + days);

      meta.nextRetryAt = next.toISOString();
    }

    function refreshBooks() {
      books = getBooks();

      const keyword = searchInput.value.toLowerCase();

      currentFilteredBooks = books.filter(book =>
        (book.title || "").toLowerCase().includes(keyword) ||
        (book.author || "").toLowerCase().includes(keyword)
      );

      updatePagination(currentFilteredBooks.length);
      renderBooks(currentFilteredBooks);
    }

    function getItemsPerPage() {
      const height = window.innerHeight;

      if (height >= 900) return 12;
      if (height >= 760) return 10;
      if (height >= 640) return 8;
      return 6;
    }

    function updatePagination(totalItems) {
      const itemsPerPage = getItemsPerPage();
      const totalPages = Math.max(1, Math.ceil(totalItems / itemsPerPage));

      if (currentPage > totalPages) {
        currentPage = totalPages;
      }

      pageInfo.textContent = `${currentPage} / ${totalPages}ページ`;

      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
    }

    refreshBooks();

    setTimeout(() => {
      refreshBookCovers();
    }, 0);

    searchInput.addEventListener("input", () => {
      currentPage = 1;
      refreshBooks();
    });

    function renderBooks(list) {
      container.innerHTML = "";
      countEl.textContent = `${list.length}件`;

      const keyword = searchInput.value;
      const itemsPerPage = getItemsPerPage();
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const pageItems = list.slice(startIndex, endIndex);

      pageItems.forEach(book => {
        const card = document.createElement("div");
        card.className = "card book-card";

        const cover = document.createElement("img");
        cover.className = "book-cover";
        cover.src = book.thumbnail || getFallbackImage();
        cover.alt = `${book.title || "書籍"} の表紙`;

        const content = document.createElement("div");
        content.className = "book-card-body";

        const title = document.createElement("h3");
        const author = document.createElement("p");
        const meta = document.createElement("p");
        const status = document.createElement("p");
        const badgeRow = document.createElement("div");
        badgeRow.className = "badge-row";

        title.innerHTML = highlight(book.title || "タイトル不明", keyword);
        author.innerHTML = highlight(book.author || "著者不明", keyword);

        if (shouldShowMissingInfoBadge(book)) {
          const missingBadge = document.createElement("span");
          missingBadge.className = "info-missing-badge";
          missingBadge.textContent = "情報不足";
          badgeRow.appendChild(missingBadge);
        }

        meta.className = "meta-text";
        meta.textContent = `ISBN: ${book.isbn}`;

        if (book.loan) {
          status.textContent = `貸出中：${book.loan.user} (${book.loan.date})`;
          status.className = "loan";
        } else {
          status.textContent = "所蔵中";
          status.className = "available";
        }

        const actionRow = document.createElement("div");
        actionRow.className = "card-action-row";

        if (book.loan) {
          const returnBtn = document.createElement("button");
          returnBtn.textContent = "返却";
          returnBtn.className = "primary-btn";
          returnBtn.onclick = () => {
            returnBook(book.isbn);
            showToast(`「${book.title}」を返却しました`);
            refreshBooks();
          };
          actionRow.appendChild(returnBtn);
        } else {
          const loanBtn = document.createElement("button");
          loanBtn.textContent = "貸出";
          loanBtn.className = "secondary-btn";
          loanBtn.onclick = () => {
            const user = prompt("貸出相手の名前を入力");
            if (!user) return;

            loanBook(book.isbn, user);
            showToast(`「${book.title}」を貸出しました`);
            refreshBooks();
          };
          actionRow.appendChild(loanBtn);
        }

        const delBtn = document.createElement("button");
        delBtn.textContent = "削除";
        delBtn.className = "danger-btn";
        delBtn.onclick = () => {
          modalMessage.textContent = `「${book.title}」を削除しますか？`;
          modal.style.display = "flex";
          targetIsbn = book.isbn;
        };
        actionRow.appendChild(delBtn);

        content.appendChild(title);

        if (badgeRow.childNodes.length > 0) {
          content.appendChild(badgeRow);
        }

        content.appendChild(author);
        content.appendChild(meta);
        content.appendChild(status);
        content.appendChild(actionRow);

        card.appendChild(cover);
        card.appendChild(content);

        container.appendChild(card);
      });

      updatePagination(list.length);
    }

    window.addEventListener("resize", () => {
      refreshBooks();
    });
  </script>
</body>
</html>
